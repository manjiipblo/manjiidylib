name: Build Manjii Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R $USER /opt/theos
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz
          mkdir -p /opt/theos/sdks
          tar -xvf iPhoneOS16.5.sdk.tar.xz -C /opt/theos/sdks
          rm iPhoneOS16.5.sdk.tar.xz

      - name: Build Dylib
        run: |
          export THEOS=/opt/theos
          make package
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ManjiiDylib-iOS18
          path: packages/*.deb
